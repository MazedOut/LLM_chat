<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LLM Chat</title>
  <style>
    body {
      margin: 0;
      background: #07051a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* tiny loading pulse so it doesn't flash blank */
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      animation: pulse 0.9s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="dot"></div>
  <script>
    // redirect based on whether a token is stored
    if (localStorage.getItem("access_token")) {
      window.location.href = "/static/chat.html";
    } else {
      window.location.href = "/static/login.html";
    }
  </script>
</body>
</html>
