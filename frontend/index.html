<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Okayish Chat</title>
  <link rel="icon" type="image/svg+xml" href="/static/squirrel.svg">
  <style>
    body {
      margin: 0;
      background: #0d1b2a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2dd4bf;
      animation: pulse 0.9s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.9); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="dot"></div>
  <script>
    if (localStorage.getItem("access_token")) {
      window.location.href = "/static/chat.html";
    } else {
      window.location.href = "/static/login.html";
    }
  </script>
</body>
</html>
