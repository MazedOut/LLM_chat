<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — LLM Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    h1 { font-size: 1.4rem; margin-bottom: 24px; color: #111; }

    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4f6ef7; }

    button {
      width: 100%;
      padding: 11px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.88; }

    .footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #666; }
    .footer a { color: #4f6ef7; text-decoration: none; }

    .error {
      background: #fff0f0;
      color: #c0392b;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.85rem;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create account</h1>

    <div class="error" id="error-msg"></div>

    <label>Username <span style="color:#c0392b">*</span></label>
    <input type="text" id="username" placeholder="choose a username">

    <label>Email (optional)</label>
    <input type="email" id="email" placeholder="you@example.com">

    <label>Password <span style="color:#c0392b">*</span></label>
    <input type="password" id="password" placeholder="••••••••">

    <button id="register-btn">Register</button>

    <div class="footer">
      Already have an account? <a href="/static/login.html">Log in</a>
    </div>
  </div>

  <script>
    const errorMsg = document.getElementById("error-msg");

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = "block";
    }

    document.getElementById("register-btn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim() || null;
      const password = document.getElementById("password").value;

      if (!username || !password) {
        showError("Username and password are required.");
        return;
      }

      const res = await fetch("/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password }),
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem("access_token", data.access_token);
        localStorage.setItem("refresh_token", data.refresh_token);
        window.location.href = "/static/chat.html";
      } else {
        const err = await res.json();
        showError(err.detail || "Registration failed.");
      }
    });
  </script>
</body>
</html>
