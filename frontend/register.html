<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okayish Chat — Register</title>
  <link rel="icon" type="image/svg+xml" href="/static/squirrel.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1b2a;
      --surface:   #112233;
      --border:    rgba(45, 212, 191, 0.15);
      --teal:      #2dd4bf;
      --teal-dark: #0f766e;
      --text:      #e2f0ff;
      --muted:     rgba(148, 196, 222, 0.55);
      --dim:       rgba(148, 196, 222, 0.3);
      --glow:      rgba(45, 212, 191, 0.18);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .bg { position: fixed; inset: 0; overflow: hidden; z-index: 0; }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.4;
      animation: drift linear infinite;
    }
    .orb-1 { width: 420px; height: 420px; background: radial-gradient(circle, #0f766e, transparent 70%); top: -120px; right: -80px; animation-duration: 26s; }
    .orb-2 { width: 320px; height: 320px; background: radial-gradient(circle, #1e40af, transparent 70%); bottom: -60px; left: -50px; animation-duration: 20s; animation-direction: reverse; }

    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(-20px,30px) scale(1.03); }
      66%  { transform: translate(16px,-14px) scale(0.98); }
      100% { transform: translate(0,0) scale(1); }
    }

    .layout {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }

    .card {
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: 0 0 50px var(--glow);
      animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
    }
    .brand img { width: 32px; height: 32px; }
    .brand-name { font-size: 1rem; font-weight: 600; color: var(--teal); }

    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 6px; }

    .subtitle { font-size: 0.84rem; color: var(--muted); margin-bottom: 26px; }

    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5; border-radius: 8px;
      padding: 10px 13px; font-size: 0.84rem;
      margin-bottom: 16px; display: none;
    }

    .field { margin-bottom: 15px; }

    label {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }

    .optional { font-size: 0.7rem; color: var(--dim); text-transform: none; letter-spacing: 0; }

    input {
      width: 100%; padding: 10px 13px;
      background: rgba(45,212,191,0.06);
      border: 1px solid rgba(45,212,191,0.18);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem; color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--dim); }
    input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(45,212,191,0.12); }

    /* password strength bar */
    .strength-bar {
      height: 3px; border-radius: 2px;
      background: rgba(45,212,191,0.08);
      margin-top: 6px; overflow: hidden;
    }
    .strength-fill {
      height: 100%; border-radius: 2px;
      width: 0%; transition: width 0.3s, background 0.3s;
    }

    .btn-primary {
      width: 100%; padding: 11px;
      background: var(--teal-dark);
      color: #fff; border: none; border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem; font-weight: 500;
      cursor: pointer; margin-top: 8px;
      transition: background 0.2s, transform 0.12s;
    }
    .btn-primary:hover { background: #0f9488; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .footer {
      text-align: center; margin-top: 20px;
      font-size: 0.83rem; color: var(--muted);
    }
    .footer a { color: var(--teal); text-decoration: none; font-weight: 500; }
    .footer a:hover { color: #5eead4; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="brand">
        <img src="/static/squirrel.svg" alt="logo">
        <span class="brand-name">Okayish Chat</span>
      </div>

      <h1>Create account</h1>
      <p class="subtitle">Start chatting with your local AI</p>

      <div class="error" id="error-msg"></div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="pick a username" autocomplete="username">
      </div>

      <div class="field">
        <label>Email <span class="optional">(optional)</span></label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>

      <button class="btn-primary" id="register-btn">Create account</button>

      <div class="footer">
        Already have an account? <a href="/static/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    // password strength indicator
    document.getElementById("password").addEventListener("input", function() {
      const pw = this.value;
      const fill = document.getElementById("strength-fill");
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const widths = ["0%","25%","50%","75%","100%"];
      const colors = ["transparent","#f87171","#fb923c","#2dd4bf","#34d399"];
      fill.style.width = widths[score];
      fill.style.background = colors[score];
    });

    document.getElementById("register-btn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const email    = document.getElementById("email").value.trim() || null;
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error-msg");

      if (!username || !password) {
        errorBox.textContent = "Username and password are required.";
        errorBox.style.display = "block";
        return;
      }

      errorBox.style.display = "none";
      const btn = document.getElementById("register-btn");
      btn.textContent = "Creating account…";
      btn.disabled = true;

      const res = await fetch("/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password }),
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem("access_token", data.access_token);
        localStorage.setItem("refresh_token", data.refresh_token);
        window.location.href = "/static/chat.html";
      } else {
        const err = await res.json().catch(() => ({}));
        errorBox.textContent = err.detail || "Registration failed.";
        errorBox.style.display = "block";
        btn.textContent = "Create account";
        btn.disabled = false;
      }
    });

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("register-btn").click();
    });
  </script>
</body>
</html>
