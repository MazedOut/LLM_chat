<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — LLM Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --midnight:    #07051a;
      --deep:        #0f0b2d;
      --purple-dark: #1a1040;
      --purple-mid:  #3b1f7a;
      --violet:      #6d28d9;
      --lavender:    #a78bfa;
      --lav-light:   #c4b5fd;
      --lav-pale:    #ede9fe;
      --white:       #f5f3ff;
      --muted:       rgba(196,181,253,0.5);
      --glass-bg:    rgba(26, 16, 64, 0.55);
      --glass-border:rgba(167,139,250,0.18);
      --glow:        rgba(109,40,217,0.35);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--midnight);
      color: var(--white);
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift linear infinite;
    }

    .orb-1 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #4c1d95, transparent 70%);
      top: -160px; right: -80px;
      animation-duration: 25s;
    }
    .orb-2 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, #7c3aed, transparent 70%);
      bottom: -80px; left: -60px;
      animation-duration: 20s;
      animation-direction: reverse;
    }
    .orb-3 {
      width: 240px; height: 240px;
      background: radial-gradient(circle, #c4b5fd, transparent 70%);
      top: 30%; right: 30%;
      opacity: 0.25;
      animation-duration: 32s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(-25px, 35px) scale(1.04); }
      66%  { transform: translate(20px, -15px) scale(0.98); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    .layout {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 0 60px var(--glow), 0 1px 0 rgba(255,255,255,0.06) inset;
      animation: cardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--lavender);
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeUp 0.4s 0.15s ease both;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.4s 0.22s ease both;
    }

    .subtitle {
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 26px;
      opacity: 0;
      animation: fadeUp 0.4s 0.26s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .field {
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.4s ease both;
    }
    .field:nth-of-type(1) { animation-delay: 0.3s; }
    .field:nth-of-type(2) { animation-delay: 0.36s; }
    .field:nth-of-type(3) { animation-delay: 0.42s; }

    label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .optional-tag {
      font-size: 0.7rem;
      color: rgba(196,181,253,0.3);
      text-transform: none;
      letter-spacing: 0;
      font-weight: 400;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(109, 40, 217, 0.12);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder { color: rgba(196,181,253,0.3); }

    input:focus {
      border-color: var(--lavender);
      background: rgba(109, 40, 217, 0.2);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
    }

    .error {
      background: rgba(220, 38, 38, 0.12);
      border: 1px solid rgba(220,38,38,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 0.84rem;
      margin-bottom: 16px;
      display: none;
    }

    .btn-wrap {
      margin-top: 8px;
      opacity: 0;
      animation: fadeUp 0.4s 0.5s ease both;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9 50%, #5b21b6);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(109,40,217,0.45);
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
      pointer-events: none;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(109,40,217,0.6);
    }

    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* password strength meter */
    .strength-bar {
      height: 3px;
      border-radius: 2px;
      background: rgba(167,139,250,0.1);
      margin-top: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      font-size: 0.84rem;
      color: rgba(196,181,253,0.5);
      opacity: 0;
      animation: fadeUp 0.4s 0.56s ease both;
    }

    .footer a {
      color: var(--lavender);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .footer a:hover { color: var(--lav-light); }
  </style>
</head>
<body>

  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="noise"></div>

  <div class="layout">
    <div class="card">
      <div class="brand">llm chat</div>
      <h1>Create account</h1>
      <p class="subtitle">Start chatting with your local AI in seconds</p>

      <div class="error" id="error-msg"></div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="pick a username" autocomplete="username">
      </div>

      <div class="field">
        <label>Email <span class="optional-tag">(optional)</span></label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>

      <div class="btn-wrap">
        <button class="btn-primary" id="register-btn">Create account</button>
      </div>

      <div class="footer">
        Already have an account? <a href="/static/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    const errorBox = document.getElementById("error-msg");

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    // little password strength indicator, just for UX
    document.getElementById("password").addEventListener("input", function() {
      const pw = this.value;
      const fill = document.getElementById("strength-fill");
      let score = 0;
      if (pw.length >= 8) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      const widths = ["0%", "25%", "50%", "75%", "100%"];
      const colors = ["transparent", "#f87171", "#fb923c", "#a78bfa", "#34d399"];
      fill.style.width = widths[score];
      fill.style.background = colors[score];
    });

    document.getElementById("register-btn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const email    = document.getElementById("email").value.trim() || null;
      const password = document.getElementById("password").value;

      if (!username || !password) {
        showError("Username and password are required.");
        return;
      }

      errorBox.style.display = "none";
      const btn = document.getElementById("register-btn");
      btn.textContent = "Creating account…";
      btn.disabled = true;

      const res = await fetch("/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password }),
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem("access_token", data.access_token);
        localStorage.setItem("refresh_token", data.refresh_token);
        window.location.href = "/static/chat.html";
      } else {
        const err = await res.json().catch(() => ({}));
        showError(err.detail || "Registration failed. Try a different username.");
        btn.textContent = "Create account";
        btn.disabled = false;
      }
    });

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("register-btn").click();
    });
  </script>
</body>
</html>
