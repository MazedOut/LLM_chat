<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okayish Chat</title>
  <link rel="icon" type="image/svg+xml" href="/static/squirrel.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1b2a;
      --topbar-bg:   #0a1520;
      --surface2:    #0f1e30;
      --border:      rgba(45,212,191,0.12);
      --teal:        #2dd4bf;
      --teal-dark:   #0f766e;
      --text:        #e2f0ff;
      --muted:       rgba(148,196,222,0.55);
      --dim:         rgba(148,196,222,0.25);
      --user-bubble: #0f766e;
      --assist-bg:   rgba(45,212,191,0.06);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .topbar {
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 10;
    }

    .topbar-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
    }

    .brand { display: flex; align-items: center; gap: 9px; }
    .brand img { width: 26px; height: 26px; }
    .brand-name { font-size: 0.95rem; font-weight: 600; color: var(--teal); }

    .topbar-right { display: flex; align-items: center; gap: 14px; }

    #username-label { font-size: 0.82rem; color: var(--muted); }

    #logout-btn {
      background: none; border: none;
      color: var(--dim); font-family: 'Inter', sans-serif;
      font-size: 0.8rem; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    #logout-btn:hover { color: #fca5a5; background: rgba(239,68,68,0.08); }

    .topbar-row2 {
      display: flex; align-items: center;
      padding: 0 14px; gap: 4px;
      overflow-x: auto; scrollbar-width: none;
      min-height: 42px;
    }
    .topbar-row2::-webkit-scrollbar { display: none; }

    .chat-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border-radius: 7px;
      cursor: pointer; font-size: 0.83rem;
      color: var(--muted); white-space: nowrap;
      flex-shrink: 0; max-width: 160px;
      transition: background 0.15s, color 0.15s;
    }
    .chat-tab:hover { background: rgba(45,212,191,0.07); color: var(--text); }
    .chat-tab.active { background: rgba(45,212,191,0.12); color: var(--teal); }

    .tab-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

    .tab-close {
      background: none; border: none;
      color: var(--dim); cursor: pointer;
      font-size: 0.9rem; line-height: 1;
      padding: 0 1px; border-radius: 3px;
      visibility: hidden;
    }
    .chat-tab:hover .tab-close { visibility: visible; }
    .tab-close:hover { color: #fca5a5; }

    #new-chat-btn {
      flex-shrink: 0;
      padding: 5px 12px;
      background: rgba(45,212,191,0.1);
      border: 1px solid rgba(45,212,191,0.2);
      border-radius: 7px;
      color: var(--teal);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem; font-weight: 500;
      cursor: pointer; margin-left: 4px;
      transition: background 0.15s, transform 0.12s;
      white-space: nowrap;
    }
    #new-chat-btn:hover { background: rgba(45,212,191,0.18); transform: translateY(-1px); }

    .no-chats-msg { font-size: 0.8rem; color: var(--dim); padding: 0 8px; white-space: nowrap; }

    .main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg);
    }

    .chat-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2); flex-shrink: 0;
    }

    #chat-title { font-size: 0.9rem; font-weight: 500; color: var(--muted); }

    #refresh-indicator {
      font-size: 0.75rem; color: var(--teal);
      opacity: 0; transition: opacity 0.3s;
    }
    #refresh-indicator.show { opacity: 1; }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 24px 20px;
      display: flex; flex-direction: column; gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: rgba(45,212,191,0.2) transparent;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(45,212,191,0.2); border-radius: 2px; }

    .placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--dim);
    }
    .placeholder img { width: 48px; height: 48px; opacity: 0.35; }
    .placeholder span { font-size: 0.9rem; }

    .message { display: flex; flex-direction: column; max-width: 70%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px; border-radius: 14px;
      font-size: 0.9rem; line-height: 1.6;
      word-break: break-word; white-space: pre-wrap;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: #e2f0ff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--assist-bg);
      border: 1px solid rgba(45,212,191,0.1);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg-time { font-size: 0.7rem; color: var(--dim); margin-top: 3px; padding: 0 3px; }

    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--teal); opacity: 0.5;
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%,80%,100% { opacity: 0.25; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--teal); margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink-cursor 0.6s step-end infinite;
    }
    @keyframes blink-cursor { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    .input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface2);
    }

    #msg-input {
      flex: 1; padding: 10px 14px;
      background: rgba(45,212,191,0.05);
      border: 1px solid rgba(45,212,191,0.15);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem; color: var(--text);
      resize: none; outline: none;
      line-height: 1.45; max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #msg-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(45,212,191,0.1); }
    #msg-input::placeholder { color: var(--dim); }
    #msg-input:disabled { opacity: 0.4; }

    #send-btn {
      padding: 10px 18px;
      background: var(--teal-dark);
      color: #fff; border: none; border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem; font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.12s;
      white-space: nowrap;
    }
    #send-btn:hover { background: #0f9488; transform: translateY(-1px); }
    #send-btn:active { transform: translateY(0); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-row1">
      <div class="brand">
        <img src="/static/squirrel.svg" alt="logo">
        <span class="brand-name">Okayish Chat</span>
      </div>
      <div class="topbar-right">
        <span id="username-label"></span>
        <button id="logout-btn">Log out</button>
      </div>
    </div>
    <div class="topbar-row2" id="chat-tabs"></div>
  </div>

  <div class="main">
    <div class="chat-header">
      <span id="chat-title">Select or start a chat</span>
      <span id="refresh-indicator">↻ refreshing</span>
    </div>

    <div id="messages">
      <div class="placeholder" id="placeholder">
        <img src="/static/squirrel.svg" alt="">
        <span>No chat selected</span>
      </div>
    </div>

    <div class="input-area">
      <textarea id="msg-input" rows="1" placeholder="Type a message… (Enter to send)" disabled></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

</div>
<script>
  let accessToken     = localStorage.getItem("access_token");
  let refreshToken    = localStorage.getItem("refresh_token");
  let currentChatId   = null;
  let chats           = [];
  let waitingForReply = false;
  let autoRefreshTimer = null;

  const params = new URLSearchParams(window.location.search);
  if (params.get("access_token")) {
    accessToken  = params.get("access_token");
    refreshToken = params.get("refresh_token");
    localStorage.setItem("access_token",  accessToken);
    localStorage.setItem("refresh_token", refreshToken);
    window.history.replaceState({}, "", "/static/chat.html");
  }

  if (!accessToken) window.location.href = "/static/login.html";

  async function apiFetch(url, options = {}) {
    options.headers = options.headers || {};
    options.headers["Authorization"] = `Bearer ${accessToken}`;
    if (!options.headers["Content-Type"])
      options.headers["Content-Type"] = "application/json";

    let res = await fetch(url, options);
    if (res.status === 401) {
      const ok = await tryRefresh();
      if (!ok) { logout(); return null; }
      options.headers["Authorization"] = `Bearer ${accessToken}`;
      res = await fetch(url, options);
    }
    return res;
  }

  async function tryRefresh() {
    const res = await fetch("/auth/refresh", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ refresh_token: refreshToken }),
    });
    if (!res.ok) return false;
    const data = await res.json();
    accessToken  = data.access_token;
    refreshToken = data.refresh_token;
    localStorage.setItem("access_token",  accessToken);
    localStorage.setItem("refresh_token", refreshToken);
    return true;
  }

  function logout() {
    localStorage.removeItem("access_token");
    localStorage.removeItem("refresh_token");
    window.location.href = "/static/login.html";
  }

  async function loadChats() {
    const res = await apiFetch("/chats");
    if (!res) return;
    chats = await res.json();
    renderTabs();

    const meRes = await apiFetch("/auth/me");
    if (meRes && meRes.ok) {
      const me = await meRes.json();
      document.getElementById("username-label").textContent = me.username;
    }
  }

  function renderTabs() {
    const container = document.getElementById("chat-tabs");
    container.innerHTML = "";

    if (chats.length === 0) {
      const empty = document.createElement("span");
      empty.className = "no-chats-msg";
      empty.textContent = "No chats yet";
      container.appendChild(empty);
    }

    chats.forEach(chat => {
      const tab = document.createElement("div");
      tab.className = "chat-tab" + (chat.id === currentChatId ? " active" : "");

      const title = document.createElement("span");
      title.className = "tab-title";
      title.textContent = chat.title;

      const close = document.createElement("button");
      close.className = "tab-close";
      close.textContent = "×";
      close.addEventListener("click", e => { e.stopPropagation(); deleteChat(chat.id); });

      tab.appendChild(title);
      tab.appendChild(close);
      tab.addEventListener("click", () => selectChat(chat.id, chat.title));
      container.appendChild(tab);
    });

    const btn = document.createElement("button");
    btn.id = "new-chat-btn";
    btn.textContent = "+ New Chat";
    btn.addEventListener("click", createChat);
    container.appendChild(btn);
  }

  async function createChat() {
    const res = await apiFetch("/chats", {
      method: "POST",
      body: JSON.stringify({ title: "New Chat" }),
    });
    if (!res || !res.ok) return;
    const chat = await res.json();
    chats.unshift(chat);
    renderTabs();
    selectChat(chat.id, chat.title);
  }

  async function deleteChat(chatId) {
    const res = await apiFetch(`/chats/${chatId}`, { method: "DELETE" });
    if (!res || !res.ok) return;
    chats = chats.filter(c => c.id !== chatId);
    if (currentChatId === chatId) {
      currentChatId = null;
      clearMessages();
      setInputEnabled(false);
      document.getElementById("chat-title").textContent = "Select or start a chat";
      stopAutoRefresh();
    }
    renderTabs();
  }

  async function selectChat(chatId, title) {
    currentChatId = chatId;
    document.getElementById("chat-title").textContent = title;
    renderTabs();
    setInputEnabled(true);

    const res = await apiFetch(`/chats/${chatId}/messages`);
    if (!res || !res.ok) return;
    const messages = await res.json();

    clearMessages();
    messages.forEach(m => appendMessage(m.role, m.content, m.created_at, false));
    scrollToBottom();
    startAutoRefresh(chatId);
  }

  function clearMessages() {
    document.getElementById("messages").innerHTML =
      `<div class="placeholder" id="placeholder">
        <img src="/static/squirrel.svg" alt="">
        <span>Start the conversation</span>
      </div>`;
  }

  function typewriterReveal(bubble, text) {
    let i = 0;
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    bubble.textContent = "";
    bubble.appendChild(cursor);
    const speed = Math.max(8, Math.min(20, Math.floor(4000 / text.length)));
    const tick = () => {
      if (i < text.length) {
        bubble.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        scrollToBottom();
        setTimeout(tick, speed);
      } else {
        cursor.remove();
      }
    };
    setTimeout(tick, speed);
  }

  function appendMessage(role, content, timestamp, animate = true) {
    const placeholder = document.getElementById("placeholder");
    if (placeholder) placeholder.remove();

    const container = document.getElementById("messages");
    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (role === "assistant" && animate) {
      typewriterReveal(bubble, content);
    } else {
      bubble.textContent = content;
    }

    const time = document.createElement("div");
    time.className = "msg-time";
    if (timestamp) {
      const d = new Date(timestamp);
      time.textContent = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    wrapper.appendChild(bubble);
    wrapper.appendChild(time);
    container.appendChild(wrapper);
    scrollToBottom();
  }

  function appendThinkingBubble() {
    const placeholder = document.getElementById("placeholder");
    if (placeholder) placeholder.remove();

    const container = document.getElementById("messages");
    const wrapper = document.createElement("div");
    wrapper.className = "message assistant";
    wrapper.id = "thinking-bubble";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
    scrollToBottom();
    return wrapper;
  }

  async function sendMessage() {
    const input = document.getElementById("msg-input");
    const content = input.value.trim();
    if (!content || !currentChatId || waitingForReply) return;

    input.value = "";
    input.style.height = "auto";
    setInputEnabled(false);
    waitingForReply = true;

    appendMessage("user", content, new Date().toISOString(), false);
    const thinking = appendThinkingBubble();

    const res = await apiFetch(`/chats/${currentChatId}/messages`, {
      method: "POST",
      body: JSON.stringify({ content }),
    });

    thinking.remove();
    waitingForReply = false;

    if (res && res.ok) {
      const data = await res.json();
      appendMessage("assistant", data.assistant_message.content, data.assistant_message.created_at, true);

      const chat = chats.find(c => c.id === currentChatId);
      if (chat && chat.title === "New Chat") {
        chat.title = content.slice(0, 28) + (content.length > 28 ? "…" : "");
        document.getElementById("chat-title").textContent = chat.title;
        renderTabs();
      }
    } else {
      appendMessage("assistant", "Something went wrong, please try again.", null, false);
    }

    setInputEnabled(true);
    document.getElementById("msg-input").focus();
  }

  function startAutoRefresh(chatId) {
    stopAutoRefresh();
    autoRefreshTimer = setInterval(async () => {
      if (waitingForReply || currentChatId !== chatId) return;

      const indicator = document.getElementById("refresh-indicator");
      indicator.classList.add("show");

      const res = await apiFetch(`/chats/${chatId}/messages`);
      indicator.classList.remove("show");
      if (!res || !res.ok) return;

      const messages = await res.json();
      const existing = document.getElementById("messages").querySelectorAll(".message").length;
      if (messages.length !== existing) {
        clearMessages();
        messages.forEach(m => appendMessage(m.role, m.content, m.created_at, false));
        scrollToBottom();
      }
    }, 15000);
  }

  function stopAutoRefresh() {
    if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  }

  function setInputEnabled(enabled) {
    document.getElementById("msg-input").disabled = !enabled;
    document.getElementById("send-btn").disabled  = !enabled;
  }

  function scrollToBottom() {
    const c = document.getElementById("messages");
    c.scrollTop = c.scrollHeight;
  }

  document.getElementById("msg-input").addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });

  document.getElementById("msg-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.getElementById("send-btn").addEventListener("click", sendMessage);
  document.getElementById("logout-btn").addEventListener("click", logout);

  loadChats();
</script>
</body>
</html>
