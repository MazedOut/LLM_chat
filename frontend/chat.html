<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --midnight:     #07051a;
      --sidebar-bg:   #0d0927;
      --sidebar-border: rgba(167,139,250,0.1);
      --purple-dark:  #1a1040;
      --purple-hover: rgba(109,40,217,0.2);
      --purple-active:rgba(109,40,217,0.3);
      --violet:       #6d28d9;
      --lavender:     #a78bfa;
      --lav-light:    #c4b5fd;
      --white:        #f5f3ff;
      --text-muted:   rgba(196,181,253,0.5);
      --text-dim:     rgba(196,181,253,0.3);
      --glass-border: rgba(167,139,250,0.15);
      --main-bg:      #0b0922;
      --user-bubble:  linear-gradient(135deg, #7c3aed, #6d28d9);
      --assist-bg:    rgba(167,139,250,0.08);
      --assist-border:rgba(167,139,250,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--midnight);
      color: var(--white);
      overflow: hidden;
    }

    /*  Layout  */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /*  Sidebar  */
    .sidebar {
      width: 248px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .sidebar-brand {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--lavender);
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    #new-chat-btn {
      width: 100%;
      padding: 9px 12px;
      background: var(--purple-hover);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 9px;
      color: var(--lav-light);
      font-family: 'Outfit', sans-serif;
      font-size: 0.86rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
    }

    #new-chat-btn:hover {
      background: var(--purple-active);
      border-color: rgba(167,139,250,0.3);
      transform: translateY(-1px);
    }

    #new-chat-btn svg { flex-shrink: 0; }

    /* chat list */
    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(109,40,217,0.3) transparent;
    }

    #chat-list::-webkit-scrollbar { width: 4px; }
    #chat-list::-webkit-scrollbar-track { background: transparent; }
    #chat-list::-webkit-scrollbar-thumb {
      background: rgba(109,40,217,0.3);
      border-radius: 2px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-muted);
      gap: 6px;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }

    .chat-item:hover { background: var(--purple-hover); color: var(--lav-light); }

    .chat-item.active {
      background: var(--purple-active);
      color: var(--lav-light);
    }

    .chat-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 2px;
      background: var(--lavender);
      border-radius: 1px;
    }

    .chat-item-title {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1rem;
      padding: 1px 3px;
      line-height: 1;
      border-radius: 4px;
      visibility: hidden;
      transition: color 0.15s, background 0.15s;
    }

    .chat-item:hover .delete-btn { visibility: visible; }

    .delete-btn:hover {
      color: #fca5a5;
      background: rgba(220,38,38,0.12);
    }

    /* sidebar footer */
    .sidebar-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--sidebar-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: #fff;
    }

    #username-label {
      font-size: 0.82rem;
      color: var(--text-muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #logout-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.78rem;
      font-family: 'Outfit', sans-serif;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    #logout-btn:hover {
      color: #fca5a5;
      background: rgba(220,38,38,0.1);
    }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--main-bg);
      position: relative;
    }

    /* subtle grid pattern on the main bg */
    .main::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(167,139,250,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,250,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .chat-header {
      position: relative;
      z-index: 1;
      padding: 16px 22px;
      border-bottom: 1px solid var(--glass-border);
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--lav-light);
      min-height: 54px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(13,9,39,0.6);
      backdrop-filter: blur(8px);
    }

    .header-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lavender);
      box-shadow: 0 0 8px var(--lavender);
      flex-shrink: 0;
      display: none;
    }

    .header-dot.visible { display: block; }

    /* refresh indicator */
    .refresh-indicator {
      margin-left: auto;
      font-size: 0.72rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .refresh-indicator.show { opacity: 1; }

    .refresh-spinner {
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(167,139,250,0.2);
      border-top-color: var(--lavender);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* messages */
    #messages {
      position: relative;
      z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(109,40,217,0.3) transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(109,40,217,0.3); border-radius: 2px; }

    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 0.9rem;
      user-select: none;
    }

    .placeholder-icon {
      font-size: 2.5rem;
      opacity: 0.4;
      margin-bottom: 4px;
    }

    /* message rows */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 68%;
      animation: msgIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message.user   { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: 16px;
      font-size: 0.91rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(109,40,217,0.4);
    }

    .message.assistant .bubble {
      background: var(--assist-bg);
      border: 1px solid var(--assist-border);
      color: var(--lav-light);
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* typing indicator */
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 16px;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--lavender);
      animation: bounce 1.2s ease-in-out infinite;
      opacity: 0.7;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* blinking cursor for typewriter */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--lavender);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Input area ── */
    .input-wrap {
      position: relative;
      z-index: 1;
      padding: 14px 22px 18px;
      border-top: 1px solid var(--glass-border);
      background: rgba(13,9,39,0.7);
      backdrop-filter: blur(10px);
    }

    .input-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: rgba(109,40,217,0.1);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 14px;
      padding: 4px 6px 4px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-inner:focus-within {
      border-color: rgba(167,139,250,0.4);
      box-shadow: 0 0 0 3px rgba(109,40,217,0.15);
    }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.92rem;
      color: var(--white);
      resize: none;
      padding: 9px 0;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      scrollbar-width: none;
    }

    #msg-input::-webkit-scrollbar { display: none; }
    #msg-input::placeholder { color: rgba(196,181,253,0.3); }
    #msg-input:disabled { opacity: 0.5; }

    #send-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      margin-bottom: 3px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 3px 12px rgba(109,40,217,0.5);
    }

    #send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 5px 18px rgba(109,40,217,0.65);
    }

    #send-btn:active:not(:disabled) { transform: translateY(0); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 6px;
      padding: 0 2px;
    }

    /* empty list label */
    .no-chats-label {
      padding: 14px 10px;
      font-size: 0.8rem;
      color: var(--text-dim);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">llm chat</div>
        <button id="new-chat-btn">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          New Chat
        </button>
      </div>
      <div id="chat-list"></div>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="avatar" id="avatar-initials">?</div>
          <span id="username-label">loading…</span>
        </div>
        <button id="logout-btn">Sign out</button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <div class="chat-header">
        <div class="header-dot" id="header-dot"></div>
        <span id="chat-title">Select or start a chat</span>
        <div class="refresh-indicator" id="refresh-indicator">
          <div class="refresh-spinner"></div>
          syncing
        </div>
      </div>

      <div id="messages">
        <div class="placeholder" id="placeholder">
          <div class="placeholder-icon">✦</div>
          <span>No chat selected</span>
          <span style="font-size:0.78rem">Hit "+ New Chat" to get started</span>
        </div>
      </div>

      <div class="input-wrap">
        <div class="input-inner">
          <textarea id="msg-input" rows="1" placeholder="Ask anything…" disabled></textarea>
          <button id="send-btn" disabled aria-label="Send message">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 7.5h13M8.5 2 14 7.5 8.5 13" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────
    let accessToken  = localStorage.getItem("access_token");
    let refreshToken = localStorage.getItem("refresh_token");
    let currentChatId = null;
    let chats = [];
    let waitingForReply = false;
    let autoRefreshTimer = null;

    // pick up tokens from OAuth redirect
    const params = new URLSearchParams(window.location.search);
    if (params.get("access_token")) {
      accessToken  = params.get("access_token");
      refreshToken = params.get("refresh_token");
      localStorage.setItem("access_token", accessToken);
      localStorage.setItem("refresh_token", refreshToken);
      window.history.replaceState({}, "", "/static/chat.html");
    }

    if (!accessToken) {
      window.location.href = "/static/login.html";
    }

    // ── Auth helpers ──────────────────────────────────────────────────────────
    async function apiFetch(url, options = {}) {
      options.headers = options.headers || {};
      options.headers["Authorization"] = `Bearer ${accessToken}`;
      options.headers["Content-Type"] = options.headers["Content-Type"] || "application/json";

      let res = await fetch(url, options);

      if (res.status === 401) {
        const ok = await tryRefresh();
        if (!ok) { logout(); return null; }
        options.headers["Authorization"] = `Bearer ${accessToken}`;
        res = await fetch(url, options);
      }

      return res;
    }

    async function tryRefresh() {
      const res = await fetch("/auth/refresh", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: refreshToken }),
      });
      if (!res.ok) return false;
      const data = await res.json();
      accessToken  = data.access_token;
      refreshToken = data.refresh_token;
      localStorage.setItem("access_token", accessToken);
      localStorage.setItem("refresh_token", refreshToken);
      return true;
    }

    function logout() {
      localStorage.removeItem("access_token");
      localStorage.removeItem("refresh_token");
      window.location.href = "/static/login.html";
    }

    // ── Username / header ─────────────────────────────────────────────────────
    async function loadUserInfo() {
      const res = await apiFetch("/auth/me");
      if (res && res.ok) {
        const me = await res.json();
        document.getElementById("username-label").textContent = me.username;
        const initials = me.username.slice(0, 2).toUpperCase();
        document.getElementById("avatar-initials").textContent = initials;
      }
    }

    // ── Chat list ─────────────────────────────────────────────────────────────
    async function loadChats() {
      const res = await apiFetch("/chats");
      if (!res) return;
      chats = await res.json();
      renderChatList();
    }

    function renderChatList() {
      const list = document.getElementById("chat-list");
      list.innerHTML = "";

      if (chats.length === 0) {
        list.innerHTML = '<div class="no-chats-label">No chats yet</div>';
        return;
      }

      chats.forEach(chat => {
        const item = document.createElement("div");
        item.className = "chat-item" + (chat.id === currentChatId ? " active" : "");
        item.dataset.id = chat.id;

        const title = document.createElement("span");
        title.className = "chat-item-title";
        title.textContent = chat.title;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.textContent = "×";
        del.title = "Delete chat";
        del.addEventListener("click", e => {
          e.stopPropagation();
          deleteChat(chat.id);
        });

        item.appendChild(title);
        item.appendChild(del);
        item.addEventListener("click", () => selectChat(chat.id, chat.title));
        list.appendChild(item);
      });
    }

    async function createChat() {
      const res = await apiFetch("/chats", {
        method: "POST",
        body: JSON.stringify({ title: "New Chat" }),
      });
      if (!res || !res.ok) return;
      const chat = await res.json();
      chats.unshift(chat);
      renderChatList();
      selectChat(chat.id, chat.title);
    }

    async function deleteChat(chatId) {
      const res = await apiFetch(`/chats/${chatId}`, { method: "DELETE" });
      if (!res || !res.ok) return;
      chats = chats.filter(c => c.id !== chatId);
      if (currentChatId === chatId) {
        currentChatId = null;
        clearMessages();
        setInputEnabled(false);
        document.getElementById("chat-title").textContent = "Select or start a chat";
        document.getElementById("header-dot").classList.remove("visible");
        stopAutoRefresh();
      }
      renderChatList();
    }

    // ── Messages ──────────────────────────────────────────────────────────────
    async function selectChat(chatId, title) {
      currentChatId = chatId;
      document.getElementById("chat-title").textContent = title;
      document.getElementById("header-dot").classList.add("visible");
      renderChatList();
      setInputEnabled(true);

      const res = await apiFetch(`/chats/${chatId}/messages`);
      if (!res || !res.ok) return;
      const messages = await res.json();

      clearMessages();
      messages.forEach(m => appendMessage(m.role, m.content, m.created_at, false));
      scrollToBottom();

      startAutoRefresh(chatId);
    }

    function clearMessages() {
      const container = document.getElementById("messages");
      container.innerHTML = '<div class="placeholder" id="placeholder"><div class="placeholder-icon">✦</div><span>Start the conversation</span></div>';
    }

    // typewriter animation for assistant replies (bonus: streaming visualization)
    function typewriterReveal(bubble, text, onDone) {
      let i = 0;
      const cursor = document.createElement("span");
      cursor.className = "cursor";
      bubble.textContent = "";
      bubble.appendChild(cursor);

      // speed adjusts based on message length so it doesn't take forever
      const speed = Math.max(8, Math.min(20, Math.floor(5000 / text.length)));

      const tick = () => {
        if (i < text.length) {
          bubble.insertBefore(document.createTextNode(text[i]), cursor);
          i++;
          scrollToBottom();
          setTimeout(tick, speed);
        } else {
          cursor.remove();
          if (onDone) onDone();
        }
      };
      setTimeout(tick, speed);
    }

    function appendMessage(role, content, timestamp, animate = true) {
      const placeholder = document.getElementById("placeholder");
      if (placeholder) placeholder.remove();

      const container = document.getElementById("messages");

      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (role === "assistant" && animate) {
        // typewriter effect for assistant messages
        typewriterReveal(bubble, content, null);
      } else {
        bubble.textContent = content;
      }

      const time = document.createElement("div");
      time.className = "msg-time";
      if (timestamp) {
        const d = new Date(timestamp);
        time.textContent = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      wrapper.appendChild(bubble);
      wrapper.appendChild(time);
      container.appendChild(wrapper);
      scrollToBottom();
    }

    function appendThinkingBubble() {
      const placeholder = document.getElementById("placeholder");
      if (placeholder) placeholder.remove();

      const container = document.getElementById("messages");
      const wrapper = document.createElement("div");
      wrapper.className = "message assistant";
      wrapper.id = "thinking-bubble";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const dots = document.createElement("div");
      dots.className = "typing-dots";
      dots.innerHTML = "<span></span><span></span><span></span>";
      bubble.appendChild(dots);

      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    async function sendMessage() {
      const input = document.getElementById("msg-input");
      const content = input.value.trim();
      if (!content || !currentChatId || waitingForReply) return;

      input.value = "";
      input.style.height = "auto";
      setInputEnabled(false);
      waitingForReply = true;

      appendMessage("user", content, new Date().toISOString(), false);
      const thinking = appendThinkingBubble();

      const res = await apiFetch(`/chats/${currentChatId}/messages`, {
        method: "POST",
        body: JSON.stringify({ content }),
      });

      thinking.remove();
      waitingForReply = false;

      if (res && res.ok) {
        const data = await res.json();
        appendMessage("assistant", data.assistant_message.content, data.assistant_message.created_at, true);

        // rename chat after first message if still "New Chat"
        const chat = chats.find(c => c.id === currentChatId);
        if (chat && chat.title === "New Chat") {
          chat.title = content.slice(0, 32) + (content.length > 32 ? "…" : "");
          document.getElementById("chat-title").textContent = chat.title;
          renderChatList();
        }
      } else {
        appendMessage("assistant", "Something went wrong. Please try again.", null, false);
      }

      setInputEnabled(true);
      document.getElementById("msg-input").focus();
    }

    //  Auto-refresh (bonus requirement) 
    // silently polls for new messages every 15s while a chat is open
    function startAutoRefresh(chatId) {
      stopAutoRefresh();
      autoRefreshTimer = setInterval(async () => {
        if (waitingForReply || currentChatId !== chatId) return;

        const indicator = document.getElementById("refresh-indicator");
        indicator.classList.add("show");

        const res = await apiFetch(`/chats/${chatId}/messages`);
        indicator.classList.remove("show");

        if (!res || !res.ok) return;
        const messages = await res.json();

        // only re-render if count changed (new message arrived from another session)
        const container = document.getElementById("messages");
        const existing = container.querySelectorAll(".message").length;
        if (messages.length !== existing) {
          clearMessages();
          messages.forEach(m => appendMessage(m.role, m.content, m.created_at, false));
          scrollToBottom();
        }
      }, 15000);
    }

    function stopAutoRefresh() {
      if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
      }
    }

    // UI helpers 
    function setInputEnabled(enabled) {
      document.getElementById("msg-input").disabled = !enabled;
      document.getElementById("send-btn").disabled = !enabled;
    }

    function scrollToBottom() {
      const c = document.getElementById("messages");
      c.scrollTop = c.scrollHeight;
    }

    // auto-grow textarea
    document.getElementById("msg-input").addEventListener("input", function() {
      this.style.height = "auto";
      this.style.height = Math.min(this.scrollHeight, 120) + "px";
    });

    document.getElementById("msg-input").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById("send-btn").addEventListener("click", sendMessage);
    document.getElementById("new-chat-btn").addEventListener("click", createChat);
    document.getElementById("logout-btn").addEventListener("click", logout);

    // Init 
    loadUserInfo();
    loadChats();
  </script>
</body>
</html>
