<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-top {
      padding: 16px;
      border-bottom: 1px solid #313244;
    }

    #new-chat-btn {
      width: 100%;
      padding: 9px 12px;
      background: #313244;
      color: #cdd6f4;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }

    #new-chat-btn:hover { background: #45475a; }

    #chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      color: #bac2de;
      transition: background 0.15s;
      gap: 6px;
    }

    .chat-item:hover { background: #313244; }
    .chat-item.active { background: #313244; color: #cdd6f4; }

    .chat-item-title {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 2px;
      line-height: 1;
      visibility: hidden;
    }

    .chat-item:hover .delete-btn { visibility: visible; }
    .delete-btn:hover { color: #f38ba8; }

    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid #313244;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #6c7086;
    }

    #username-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #logout-btn {
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      font-size: 0.82rem;
    }

    #logout-btn:hover { color: #f38ba8; }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid #e8e8e8;
      font-weight: 600;
      font-size: 0.95rem;
      color: #222;
      min-height: 50px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 0.95rem;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 72%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #4f6ef7;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #f0f0f0;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .msg-time {
      font-size: 0.72rem;
      color: #aaa;
      margin-top: 3px;
      padding: 0 4px;
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 20px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.93rem;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.4;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    #msg-input:focus { border-color: #4f6ef7; }

    #send-btn {
      padding: 10px 18px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover { opacity: 0.88; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .thinking {
      color: #aaa;
      font-size: 0.88rem;
      font-style: italic;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <button id="new-chat-btn">+ New Chat</button>
    </div>
    <div id="chat-list"></div>
    <div class="sidebar-footer">
      <span id="username-label"></span>
      <button id="logout-btn">Log out</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="chat-header" id="chat-title">Select or start a chat</div>
    <div id="messages">
      <div class="placeholder" id="placeholder">No chat selected</div>
    </div>
    <div class="input-area">
      <textarea id="msg-input" rows="1" placeholder="Type a message…" disabled></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────
    let accessToken = localStorage.getItem("access_token");
    let refreshToken = localStorage.getItem("refresh_token");
    let currentChatId = null;
    let chats = [];

    // pick up tokens from OAuth redirect
    const params = new URLSearchParams(window.location.search);
    if (params.get("access_token")) {
      accessToken = params.get("access_token");
      refreshToken = params.get("refresh_token");
      localStorage.setItem("access_token", accessToken);
      localStorage.setItem("refresh_token", refreshToken);
      window.history.replaceState({}, "", "/static/chat.html");
    }

    if (!accessToken) {
      window.location.href = "/static/login.html";
    }

    // ── Auth helpers ───────────────────────────────────────────
    async function apiFetch(url, options = {}) {
      options.headers = options.headers || {};
      options.headers["Authorization"] = `Bearer ${accessToken}`;
      options.headers["Content-Type"] = options.headers["Content-Type"] || "application/json";

      let res = await fetch(url, options);

      if (res.status === 401) {
        // try to refresh
        const refreshed = await tryRefresh();
        if (!refreshed) { logout(); return null; }
        options.headers["Authorization"] = `Bearer ${accessToken}`;
        res = await fetch(url, options);
      }

      return res;
    }

    async function tryRefresh() {
      const res = await fetch("/auth/refresh", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ refresh_token: refreshToken }),
      });
      if (!res.ok) return false;
      const data = await res.json();
      accessToken = data.access_token;
      refreshToken = data.refresh_token;
      localStorage.setItem("access_token", accessToken);
      localStorage.setItem("refresh_token", refreshToken);
      return true;
    }

    function logout() {
      localStorage.removeItem("access_token");
      localStorage.removeItem("refresh_token");
      window.location.href = "/static/login.html";
    }

    // ── Chat list ──────────────────────────────────────────────
    async function loadChats() {
      const res = await apiFetch("/chats");
      if (!res) return;
      chats = await res.json();
      renderChatList();


    // get actual username from API
      const meRes = await apiFetch("/auth/me");
      if (meRes && meRes.ok) {
        const me = await meRes.json();
        document.getElementById("username-label").textContent = me.username;
      }
    }

    function renderChatList() {
      const list = document.getElementById("chat-list");
      list.innerHTML = "";

      if (chats.length === 0) {
        list.innerHTML = '<div style="padding:12px 10px;font-size:0.82rem;color:#6c7086">No chats yet</div>';
        return;
      }

      chats.forEach(chat => {
        const item = document.createElement("div");
        item.className = "chat-item" + (chat.id === currentChatId ? " active" : "");
        item.dataset.id = chat.id;

        const title = document.createElement("span");
        title.className = "chat-item-title";
        title.textContent = chat.title;

        const del = document.createElement("button");
        del.className = "delete-btn";
        del.textContent = "×";
        del.title = "Delete chat";
        del.addEventListener("click", (e) => {
          e.stopPropagation();
          deleteChat(chat.id);
        });

        item.appendChild(title);
        item.appendChild(del);
        item.addEventListener("click", () => selectChat(chat.id, chat.title));
        list.appendChild(item);
      });
    }

    async function createChat() {
      const res = await apiFetch("/chats", {
        method: "POST",
        body: JSON.stringify({ title: "New Chat" }),
      });
      if (!res || !res.ok) return;
      const chat = await res.json();
      chats.unshift(chat);
      renderChatList();
      selectChat(chat.id, chat.title);
    }

    async function deleteChat(chatId) {
      const res = await apiFetch(`/chats/${chatId}`, { method: "DELETE" });
      if (!res || !res.ok) return;
      chats = chats.filter(c => c.id !== chatId);
      if (currentChatId === chatId) {
        currentChatId = null;
        clearMessages();
        setInputEnabled(false);
        document.getElementById("chat-title").textContent = "Select or start a chat";
      }
      renderChatList();
    }

    // ── Messages ───────────────────────────────────────────────
    async function selectChat(chatId, title) {
      currentChatId = chatId;
      document.getElementById("chat-title").textContent = title;
      renderChatList();
      setInputEnabled(true);

      const res = await apiFetch(`/chats/${chatId}/messages`);
      if (!res || !res.ok) return;
      const messages = await res.json();

      clearMessages();
      messages.forEach(m => appendMessage(m.role, m.content, m.created_at));
      scrollToBottom();
    }

    function clearMessages() {
      const container = document.getElementById("messages");
      container.innerHTML = '<div class="placeholder" id="placeholder">Start the conversation</div>';
    }

    function appendMessage(role, content, timestamp) {
      const placeholder = document.getElementById("placeholder");
      if (placeholder) placeholder.remove();

      const container = document.getElementById("messages");

      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;

      const time = document.createElement("div");
      time.className = "msg-time";
      if (timestamp) {
        const d = new Date(timestamp);
        time.textContent = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      wrapper.appendChild(bubble);
      wrapper.appendChild(time);
      container.appendChild(wrapper);
      scrollToBottom();
    }

    function appendThinking() {
      const placeholder = document.getElementById("placeholder");
      if (placeholder) placeholder.remove();

      const container = document.getElementById("messages");
      const wrapper = document.createElement("div");
      wrapper.className = "message assistant";
      wrapper.id = "thinking-bubble";

      const bubble = document.createElement("div");
      bubble.className = "bubble thinking";
      bubble.textContent = "Thinking…";

      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      scrollToBottom();
      return wrapper;
    }

    async function sendMessage() {
      const input = document.getElementById("msg-input");
      const content = input.value.trim();
      if (!content || !currentChatId) return;

      input.value = "";
      input.style.height = "auto";
      setInputEnabled(false);

      appendMessage("user", content, new Date().toISOString());
      const thinking = appendThinking();

      const res = await apiFetch(`/chats/${currentChatId}/messages`, {
        method: "POST",
        body: JSON.stringify({ content }),
      });

      thinking.remove();

      if (res && res.ok) {
        const data = await res.json();
        appendMessage("assistant", data.assistant_message.content, data.assistant_message.created_at);

        // rename chat after first message if still "New Chat"
        const chat = chats.find(c => c.id === currentChatId);
        if (chat && chat.title === "New Chat") {
          chat.title = content.slice(0, 30) + (content.length > 30 ? "…" : "");
          document.getElementById("chat-title").textContent = chat.title;
          renderChatList();
        }
      } else {
        appendMessage("assistant", "Something went wrong. Please try again.", null);
      }

      setInputEnabled(true);
      document.getElementById("msg-input").focus();
    }

    // ── UI helpers ─────────────────────────────────────────────
    function setInputEnabled(enabled) {
      document.getElementById("msg-input").disabled = !enabled;
      document.getElementById("send-btn").disabled = !enabled;
    }

    function scrollToBottom() {
      const container = document.getElementById("messages");
      container.scrollTop = container.scrollHeight;
    }

    // auto-grow textarea
    document.getElementById("msg-input").addEventListener("input", function () {
      this.style.height = "auto";
      this.style.height = Math.min(this.scrollHeight, 120) + "px";
    });

    document.getElementById("msg-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById("send-btn").addEventListener("click", sendMessage);
    document.getElementById("new-chat-btn").addEventListener("click", createChat);
    document.getElementById("logout-btn").addEventListener("click", logout);

    // ── Init ───────────────────────────────────────────────────
    loadChats();
  </script>
</body>
</html>
