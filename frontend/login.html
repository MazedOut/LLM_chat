<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okayish Chat — Sign in</title>
  <link rel="icon" type="image/svg+xml" href="/static/squirrel.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1b2a;
      --surface:   #112233;
      --border:    rgba(45, 212, 191, 0.15);
      --teal:      #2dd4bf;
      --teal-dark: #0f766e;
      --azure:     #60a5fa;
      --text:      #e2f0ff;
      --muted:     rgba(148, 196, 222, 0.55);
      --dim:       rgba(148, 196, 222, 0.3);
      --glow:      rgba(45, 212, 191, 0.2);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* background orbs */
    .bg {
      position: fixed; inset: 0;
      overflow: hidden; z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.4;
      animation: drift linear infinite;
    }
    .orb-1 { width: 460px; height: 460px; background: radial-gradient(circle, #0f766e, transparent 70%); top: -140px; left: -100px; animation-duration: 24s; }
    .orb-2 { width: 340px; height: 340px; background: radial-gradient(circle, #1d4ed8, transparent 70%); bottom: -80px; right: -60px; animation-duration: 18s; animation-direction: reverse; }
    .orb-3 { width: 220px; height: 220px; background: radial-gradient(circle, #2dd4bf, transparent 70%); top: 45%; left: 55%; opacity: 0.2; animation-duration: 30s; }

    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(25px,-35px) scale(1.04); }
      66%  { transform: translate(-18px,18px) scale(0.97); }
      100% { transform: translate(0,0) scale(1); }
    }

    .layout {
      position: relative; z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: 0 0 50px var(--glow);
      animation: slideUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* logo + brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .brand img {
      width: 32px; height: 32px;
    }

    .brand-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: 0.01em;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 28px;
      color: var(--text);
    }

    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 0.84rem;
      margin-bottom: 16px;
      display: none;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 13px;
      background: rgba(45,212,191,0.06);
      border: 1px solid rgba(45,212,191,0.18);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder { color: var(--dim); }
    input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(45,212,191,0.12);
    }

    .btn-primary {
      width: 100%;
      padding: 11px;
      background: var(--teal-dark);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.2s, transform 0.12s;
    }

    .btn-primary:hover { background: #0f9488; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 14px 0;
      font-size: 0.78rem; color: var(--dim);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(45,212,191,0.1);
    }

    .btn-github {
      width: 100%;
      padding: 11px;
      background: rgba(255,255,255,0.04);
      color: #94c4de;
      border: 1px solid rgba(45,212,191,0.15);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.2s, border-color 0.2s, transform 0.12s;
    }

    .btn-github:hover {
      background: rgba(45,212,191,0.08);
      border-color: rgba(45,212,191,0.3);
      transform: translateY(-1px);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.83rem;
      color: var(--muted);
    }

    .footer a { color: var(--teal); text-decoration: none; font-weight: 500; }
    .footer a:hover { color: #5eead4; }
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="brand">
        <img src="/static/squirrel.svg" alt="squirrel logo">
        <span class="brand-name">Okayish Chat</span>
      </div>

      <h1>Welcome back</h1>

      <div class="error" id="error-msg"></div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="your username" autocomplete="username">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-primary" id="login-btn">Sign in</button>

      <div class="divider">or</div>

      <button class="btn-github" onclick="window.location.href='/auth/github'">
        <svg height="16" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
            0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
            -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
            .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
            -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
            .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
            .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
            0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        Continue with GitHub
      </button>

      <div class="footer">
        No account? <a href="/static/register.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    const errorBox = document.getElementById("error-msg");

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    document.getElementById("login-btn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) { showError("Please fill in all fields."); return; }

      errorBox.style.display = "none";
      const btn = document.getElementById("login-btn");
      btn.textContent = "Signing in…";
      btn.disabled = true;

      const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem("access_token", data.access_token);
        localStorage.setItem("refresh_token", data.refresh_token);
        window.location.href = "/static/chat.html";
      } else {
        const err = await res.json().catch(() => ({}));
        showError(err.detail || "Login failed.");
        btn.textContent = "Sign in";
        btn.disabled = false;
      }
    });

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("login-btn").click();
    });
  </script>
</body>
</html>
