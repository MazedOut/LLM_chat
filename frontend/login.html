<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — LLM Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --midnight:    #07051a;
      --deep:        #0f0b2d;
      --purple-dark: #1a1040;
      --purple-mid:  #3b1f7a;
      --violet:      #6d28d9;
      --lavender:    #a78bfa;
      --lav-light:   #c4b5fd;
      --lav-pale:    #ede9fe;
      --white:       #f5f3ff;
      --muted:       rgba(196,181,253,0.5);
      --glass-bg:    rgba(26, 16, 64, 0.55);
      --glass-border:rgba(167,139,250,0.18);
      --glow:        rgba(109,40,217,0.35);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--midnight);
      color: var(--white);
      overflow: hidden;
    }

    /* animated orb background */
    .bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift linear infinite;
    }

    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #4c1d95, transparent 70%);
      top: -180px; left: -120px;
      animation-duration: 22s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #7c3aed, transparent 70%);
      bottom: -100px; right: -80px;
      animation-duration: 18s;
      animation-direction: reverse;
    }
    .orb-3 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, #a78bfa, transparent 70%);
      top: 40%; left: 50%;
      opacity: 0.3;
      animation-duration: 28s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -40px) scale(1.05); }
      66%  { transform: translate(-20px, 20px) scale(0.97); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* noise overlay for texture */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    /* layout */
    .layout {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* card */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 0 60px var(--glow), 0 1px 0 rgba(255,255,255,0.06) inset;
      animation: cardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--lavender);
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeUp 0.4s 0.15s ease both;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.4s 0.22s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .field {
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp 0.4s ease both;
    }
    .field:nth-child(3) { animation-delay: 0.28s; }
    .field:nth-child(4) { animation-delay: 0.34s; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(109, 40, 217, 0.12);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder { color: rgba(196,181,253,0.35); }

    input:focus {
      border-color: var(--lavender);
      background: rgba(109, 40, 217, 0.2);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
    }

    /* error */
    .error {
      background: rgba(220, 38, 38, 0.12);
      border: 1px solid rgba(220,38,38,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 13px;
      font-size: 0.84rem;
      margin-bottom: 16px;
      display: none;
    }

    /* buttons */
    .btn-wrap {
      opacity: 0;
      animation: fadeUp 0.4s 0.42s ease both;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9 50%, #5b21b6);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(109,40,217,0.45);
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
      pointer-events: none;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(109,40,217,0.6);
    }

    .btn-primary:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
      color: rgba(196,181,253,0.3);
      font-size: 0.78rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(167,139,250,0.15);
    }

    .btn-github {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--lav-light);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.92rem;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .btn-github:hover {
      background: rgba(167,139,250,0.1);
      border-color: rgba(167,139,250,0.35);
      transform: translateY(-1px);
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      font-size: 0.84rem;
      color: rgba(196,181,253,0.5);
      opacity: 0;
      animation: fadeUp 0.4s 0.5s ease both;
    }

    .footer a {
      color: var(--lavender);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .footer a:hover { color: var(--lav-light); }
  </style>
</head>
<body>

  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="noise"></div>

  <div class="layout">
    <div class="card">
      <div class="brand">llm chat</div>
      <h1>Welcome back</h1>

      <div class="error" id="error-msg"></div>

      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="your username" autocomplete="username">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <div class="btn-wrap">
        <button class="btn-primary" id="login-btn">Sign in</button>

        <div class="divider">or</div>

        <button class="btn-github" onclick="window.location.href='/auth/github'">
          <svg height="16" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
              .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
              .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
              0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          Continue with GitHub
        </button>
      </div>

      <div class="footer">
        No account? <a href="/static/register.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    const errorBox = document.getElementById("error-msg");

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    document.getElementById("login-btn").addEventListener("click", async () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        showError("Please fill in all fields.");
        return;
      }

      errorBox.style.display = "none";
      const btn = document.getElementById("login-btn");
      btn.textContent = "Signing in…";
      btn.disabled = true;

      const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem("access_token", data.access_token);
        localStorage.setItem("refresh_token", data.refresh_token);
        window.location.href = "/static/chat.html";
      } else {
        const err = await res.json().catch(() => ({}));
        showError(err.detail || "Login failed. Check your credentials.");
        btn.textContent = "Sign in";
        btn.disabled = false;
      }
    });

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("login-btn").click();
    });
  </script>
</body>
</html>
